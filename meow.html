<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Cat Soaring!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB, #ffffff); /* Sky gradient */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pixelify Sans', cursive, sans-serif; /* A pixel-style font */
        }

        /* If you don't have Pixelify Sans installed,
           you can link it from Google Fonts like this: */
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap');

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .cat-container {
            position: absolute;
            top: 50%;
            left: -200px; /* Start off-screen */
            transform: translateY(-50%);
            animation: fly-across 10s linear infinite;
        }

        /* Pixel Cat Plushie (CSS Art) */
        .pixel-cat {
            width: 80px;
            height: 60px;
            background-color: #fdd835; /* Yellow body */
            position: relative;
            border-radius: 8px;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2); /* Pixel border effect */
            animation: bounce 0.8s ease-in-out infinite alternate;
        }

        .pixel-cat::before, .pixel-cat::after { /* Ears */
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 20px solid #fdd835;
            top: -15px;
        }
        .pixel-cat::before { left: 5px; transform: skewX(-15deg); }
        .pixel-cat::after { right: 5px; transform: skewX(15deg); }

        .pixel-cat .face {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pixel-cat .eyes {
            display: flex;
            gap: 15px;
        }

        .pixel-cat .eye {
            width: 8px;
            height: 8px;
            background: #212121;
            border-radius: 50%;
        }

        .pixel-cat .nose {
            width: 10px;
            height: 6px;
            background: #e91e63;
            border-radius: 50%;
            margin-top: 5px;
        }

        /* Rainbow Tail */
        .rainbow-tail {
            position: absolute;
            left: -120px; /* Position behind the cat */
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 30px;
            overflow: hidden;
            z-index: -1; /* Behind the cat */
            animation: tail-sway 0.5s ease-in-out infinite alternate;
        }

        .rainbow-segment {
            position: absolute;
            width: 20px;
            height: 30px;
            border-radius: 50%;
            opacity: 0.8;
            transform: scale(0.8);
            filter: blur(2px);
        }

        .rainbow-segment:nth-child(1) { background-color: #FF0000; left: 0; } /* Red */
        .rainbow-segment:nth-child(2) { background-color: #FF7F00; left: 15px; } /* Orange */
        .rainbow-segment:nth-child(3) { background-color: #FFFF00; left: 30px; } /* Yellow */
        .rainbow-segment:nth-child(4) { background-color: #00FF00; left: 45px; } /* Green */
        .rainbow-segment:nth-child(5) { background-color: #0000FF; left: 60px; } /* Blue */
        .rainbow-segment:nth-child(6) { background-color: #4B0082; left: 75px; } /* Indigo */
        .rainbow-segment:nth-child(7) { background-color: #9400D3; left: 90px; } /* Violet */

        /* Clouds */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
            opacity: 0.8;
            animation: float-cloud 20s linear infinite;
        }
        .cloud:nth-child(1) { width: 120px; height: 70px; top: 10%; left: 0%; animation-delay: 0s; }
        .cloud:nth-child(1)::before, .cloud:nth-child(1)::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud:nth-child(1)::before { width: 60px; height: 60px; top: -20px; left: 20px; }
        .cloud:nth-child(1)::after { width: 80px; height: 80px; top: -10px; right: 10px; }

        .cloud:nth-child(2) { width: 90px; height: 50px; top: 60%; left: 30%; animation-delay: 5s; animation-duration: 25s; }
        .cloud:nth-child(2)::before, .cloud:nth-child(2)::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud:nth-child(2)::before { width: 50px; height: 50px; top: -15px; left: 10px; }
        .cloud:nth-child(2)::after { width: 70px; height: 70px; top: -5px; right: 5px; }


        .title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #4A4A4A;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            font-size: 2.5em;
            z-index: 10;
        }

        /* Animations */
        @keyframes fly-across {
            0% { left: -200px; }
            100% { left: 120vw; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        @keyframes tail-sway {
            0% { transform: translateY(-50%) rotate(10deg); }
            100% { transform: translateY(-50%) rotate(-10deg); }
        }

        @keyframes float-cloud {
            0% { transform: translateX(-100vw); }
            100% { transform: translateX(200vw); }
        }
    </style>
</head>
<body>

    <div class="scene">
        <h1 class="title">Behold, the Majestic Floof!</h1>
        <div class="cloud"></div>
        <div class="cloud"></div>

        <div class="cat-container">
            <div class="rainbow-tail">
                <div class="rainbow-segment"></div>
                <div class="rainbow-segment"></div>
                <div class="rainbow-segment"></div>
                <div class="rainbow-segment"></div>
                <div class="rainbow-segment"></div>
                <div class="rainbow-segment"></div>
                <div class="rainbow-segment"></div>
            </div>
            <div class="pixel-cat">
                <div class="face">
                    <div class="eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="nose"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
